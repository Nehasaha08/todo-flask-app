{% extends "base.html" %}
{% block  title %}Tasks{% endblock %}
{% block content %} 
<div class="task-box">
    <h2>Your Task</h2>
    <form action="{{ url_for('task.addtask') }}" method="POST" class="task-form ">
        <input type="text" name="title" placeholder="enter your work"  required>
        <button type="submit" class="btn">add</button>



        <div class="form-group">
            <label for="username">username</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div class="form-group">
            <label for="password">password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit" class="btn">login</button>
    </form>
    {% if tasks %} 
    <form action="{{ url_for('task.cleartask') }}" method="POST">

        <button type="submit" class="btn btn-clear">Clear Tasks</button>
    </form>
<br>
<table class="task-table">
    <thead>
        <tr>
        <th>#</th>
        <th>Task</th>
        <th>Status</th>
        <th>Change</th>

        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ task.title }}</td>
            <td>
                <span class="badge {{ task.status|lower }}">{{ task.status }}</span>

            </td>
            <td>
                <form action="{{url_for('task.togglestatus', task_id=task.id)}}" method="POST">
                    <button class="btn-small" type="submit">Next</button>
                </form>
            </td>
        </tr>


        {% endfor %}
    </tbody>


</table>
{% else %}
<p> No Task,Add one</p>
{% endif %}
</div>

{% endblock %}
